<!DOCTYPE html>
<html>
<head>
    <title>Tinkle Party Games</title>
    <link rel="icon" type="image/png" href="yes.ico">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <style>
        /* Keep your existing iframe container styles */
        #iframeContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 1000;
            display: none;
        }
        
        #iframeContainer iframe {
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        body.iframe-open #container {
            display: none;
        }
        
        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 5px;
            z-index: 2000;
            animation: slideIn 0.3s ease-out;
        }
        
        #notification.success {
            background-color: #4CAF50;
            color: white;
        }
        
        #notification.error {
            background-color: #f44336;
            color: white;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .hidden {
            display: none;
        }
        
        /* Optional: Show a hint for the backslash key */
        #backslashHint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #cbd5f5;
            z-index: 1002;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
            font-family: monospace;
        }
        
        #backslashHint.show {
            opacity: 1;
        }
        
        /* ADDED: Back button hide/show animation */
        .back-button {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        .back-button.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px);
        }
    </style>
</head>
<body>
    <div id="container">
        <h2>Enter Code</h2>
        <input type="text" id="codeInput" placeholder="Enter your code..." />

        <button id="submitBtn">Submit</button>

        <div id="result"></div>

        <!-- Open Page button -->
        <button id="openPageBtn" class="hidden">Open Page</button>

        <!-- Hint for sites that cannot open in iframe -->
        <div id="iframeHint" class="hidden" style="color: yellow; margin-top: 10px;"></div>
    </div>

    <!-- Iframe container for same-tab display -->
    <div id="iframeContainer">
        <iframe id="siteFrame" allowfullscreen></iframe>
    </div>
    
    <!-- Hint for backslash key (appears when iframe is open) -->
    <div id="backslashHint">Press \ (backslash) to exit</div>

    <div id="notification" class="hidden"></div>

    <script>
        let generatedLink = "";
        let iframeAllowed = false;

        async function checkCode() {
            const code = document.getElementById('codeInput').value.trim();
            const resultDiv = document.getElementById('result');
            const submitBtn = document.getElementById('submitBtn');
            const openPageBtn = document.getElementById('openPageBtn');
            const iframeHint = document.getElementById('iframeHint');

            try {
                const response = await fetch('https://raw.githubusercontent.com/tinklegames/redirect/main/codes.json');
                const data = await response.json();

                if (data[code]) {
                    const parts = data[code].split('|');
                    generatedLink = parts[0];
                    iframeAllowed = parts[1] === 'true';

                    document.getElementById('codeInput').value = generatedLink;
                    resultDiv.innerHTML = "✅ Link generated successfully!";

                    const newBtn = submitBtn.cloneNode(true);
                    submitBtn.parentNode.replaceChild(newBtn, submitBtn);
                    newBtn.innerHTML = "Copy Link";
                    newBtn.addEventListener('click', () => copyLink(generatedLink));
                    newBtn.style.backgroundColor = "#4CAF50";

                    if (iframeAllowed) {
                        openPageBtn.classList.remove("hidden");
                        iframeHint.classList.add("hidden");
                    } else {
                        openPageBtn.classList.add("hidden");
                        iframeHint.classList.remove("hidden");
                        iframeHint.textContent = "⚠️ This site cannot open in an iframe. Copy and paste the link in your browser instead.";
                    }

                    showNotification("✅ Valid code! Link generated.", "success");
                } else {
                    resultDiv.innerHTML = "❌ Invalid code. Try again.";
                    showNotification("❌ Invalid code. Please try again.", "error");
                    openPageBtn.classList.add("hidden");
                    iframeHint.classList.add("hidden");
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = "⚠️ Error fetching codes. Please try again later.";
                showNotification("⚠️ Error fetching codes. Try again later.", "error");
            }
        }

        function resetForNewCode() {
            const submitBtn = document.getElementById('submitBtn');
            const openPageBtn = document.getElementById('openPageBtn');
            const iframeHint = document.getElementById('iframeHint');
            const resultDiv = document.getElementById('result');
            
            const newBtn = submitBtn.cloneNode(true);
            submitBtn.parentNode.replaceChild(newBtn, submitBtn);
            newBtn.innerHTML = "Submit";
            newBtn.style.backgroundColor = "";
            newBtn.addEventListener('click', checkCode);
            
            openPageBtn.classList.add("hidden");
            iframeHint.classList.add("hidden");
            resultDiv.innerHTML = "";
            generatedLink = "";
            iframeAllowed = false;
        }

        function copyLink(link) {
            navigator.clipboard.writeText(link).then(() => {
                showNotification("🔗 Link copied to clipboard!", "success");
            }).catch(err => {
                console.error("Error copying link:", err);
                showNotification("❌ Failed to copy link.", "error");
            });
        }

        // MODIFIED: Added code to hide back button when iframe opens
        function openPage() {
            if (!generatedLink || !iframeAllowed) return;

            // HIDE the back button when game iframe opens
            const backButton = document.querySelector('.back-button');
            if (backButton) backButton.classList.add('hidden');

            const iframeContainer = document.getElementById('iframeContainer');
            const iframe = document.getElementById('siteFrame');
            const backslashHint = document.getElementById('backslashHint');
            
            iframe.src = generatedLink;
            iframeContainer.style.display = 'block';
            document.body.classList.add('iframe-open');
            
            // Show the backslash hint
            backslashHint.classList.add('show');
            
            // Hide hint after 5 seconds
            setTimeout(() => {
                backslashHint.classList.remove('show');
            }, 5000);
        }

        // MODIFIED: Added code to show back button when iframe closes
        function closeIframe() {
            const iframeContainer = document.getElementById('iframeContainer');
            const iframe = document.getElementById('siteFrame');
            const backslashHint = document.getElementById('backslashHint');
            
            iframe.src = 'about:blank';
            iframeContainer.style.display = 'none';
            document.body.classList.remove('iframe-open');
            
            // Hide the hint
            backslashHint.classList.remove('show');
            
            // SHOW the back button again when game iframe closes
            const backButton = document.querySelector('.back-button');
            if (backButton) backButton.classList.remove('hidden');
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.innerHTML = message;
            notification.className = type;
            notification.style.display = 'block';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // Keyboard listener for backslash key to exit game
        function setupKeyboardExit() {
            document.addEventListener('keydown', (e) => {
                // Check if backslash key is pressed (key code 220)
                if (e.key === '\\' || e.keyCode === 220) {
                    const iframeContainer = document.getElementById('iframeContainer');
                    // Only close if iframe is currently open
                    if (iframeContainer.style.display === 'block') {
                        e.preventDefault(); // Prevent default backslash behavior
                        closeIframe();
                    }
                }
            });
        }

        // Input event listener
        document.getElementById('codeInput').addEventListener('input', function() {
            resetForNewCode();
        });

        document.getElementById('submitBtn').addEventListener('click', checkCode);
        document.getElementById('openPageBtn').addEventListener('click', openPage);

        document.getElementById('openPageBtn').classList.add('hidden');
        document.getElementById('iframeHint').classList.add('hidden');
        document.getElementById('iframeContainer').style.display = 'none';
        
        // Setup keyboard exit listener
        setupKeyboardExit();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Tinkle Party Games</title>
    <link rel="icon" type="image/png" href="yes.ico">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <style>
        /* Keep ALL your original styles, just add/update these */

        /* Updated close button styles - perfect circle, draggable */
        #closeIframeBtn {
            position: fixed;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.4);
            color: #cbd5f5;
            cursor: grab;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            font-size: 18px;
            font-weight: 300;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            user-select: none;
            -webkit-user-select: none;
            line-height: 1;
            padding: 0;
            margin: 0;
        }

        #closeIframeBtn:active {
            cursor: grabbing;
        }

        #closeIframeBtn.dragging {
            cursor: grabbing;
            opacity: 0.85;
            transition: none;
            transform: scale(1.05);
            pointer-events: none;
        }

        #closeIframeBtn:hover {
            background: rgba(239, 68, 68, 0.95);
            border-color: rgba(239, 68, 68, 0.7);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.4);
            cursor: grab;
        }
        
        /* Keep your existing iframe container styles */
        #iframeContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 1000;
            display: none;
        }
        
        #iframeContainer iframe {
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        body.iframe-open #container {
            display: none;
        }
        
        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 5px;
            z-index: 2000;
            animation: slideIn 0.3s ease-out;
        }
        
        #notification.success {
            background-color: #4CAF50;
            color: white;
        }
        
        #notification.error {
            background-color: #f44336;
            color: white;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <h2>Enter Code</h2>
        <input type="text" id="codeInput" placeholder="Enter your code..." />

        <button id="submitBtn">Submit</button>

        <div id="result"></div>

        <!-- Open Page button -->
        <button id="openPageBtn" class="hidden">Open Page</button>

        <!-- Hint for sites that cannot open in iframe -->
        <div id="iframeHint" class="hidden" style="color: yellow; margin-top: 10px;"></div>
    </div>

    <!-- Iframe container for same-tab display -->
    <div id="iframeContainer">
        <iframe id="siteFrame" allowfullscreen></iframe>
    </div>
    <button id="closeIframeBtn">✕</button>

    <div id="notification" class="hidden"></div>

    <script>
        let generatedLink = "";
        let iframeAllowed = false;
        
        // Draggable variables
        let isDragging = false;
        let hasMoved = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let buttonStartX = 0;
        let buttonStartY = 0;
        let dragHandler = null;
        let dragEndHandler = null;

        async function checkCode() {
            const code = document.getElementById('codeInput').value.trim();
            const resultDiv = document.getElementById('result');
            const submitBtn = document.getElementById('submitBtn');
            const openPageBtn = document.getElementById('openPageBtn');
            const iframeHint = document.getElementById('iframeHint');

            try {
                const response = await fetch('https://raw.githubusercontent.com/tinklegames/redirect/main/codes.json');
                const data = await response.json();

                if (data[code]) {
                    const parts = data[code].split('|');
                    generatedLink = parts[0];
                    iframeAllowed = parts[1] === 'true';

                    document.getElementById('codeInput').value = generatedLink;
                    resultDiv.innerHTML = "✅ Link generated successfully!";

                    const newBtn = submitBtn.cloneNode(true);
                    submitBtn.parentNode.replaceChild(newBtn, submitBtn);
                    newBtn.innerHTML = "Copy Link";
                    newBtn.addEventListener('click', () => copyLink(generatedLink));
                    newBtn.style.backgroundColor = "#4CAF50";

                    if (iframeAllowed) {
                        openPageBtn.classList.remove("hidden");
                        iframeHint.classList.add("hidden");
                    } else {
                        openPageBtn.classList.add("hidden");
                        iframeHint.classList.remove("hidden");
                        iframeHint.textContent = "⚠️ This site cannot open in an iframe. Copy and paste the link in your browser instead.";
                    }

                    showNotification("✅ Valid code! Link generated.", "success");
                } else {
                    resultDiv.innerHTML = "❌ Invalid code. Try again.";
                    showNotification("❌ Invalid code. Please try again.", "error");
                    openPageBtn.classList.add("hidden");
                    iframeHint.classList.add("hidden");
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = "⚠️ Error fetching codes. Please try again later.";
                showNotification("⚠️ Error fetching codes. Try again later.", "error");
            }
        }

        function resetForNewCode() {
            const submitBtn = document.getElementById('submitBtn');
            const openPageBtn = document.getElementById('openPageBtn');
            const iframeHint = document.getElementById('iframeHint');
            const resultDiv = document.getElementById('result');
            
            const newBtn = submitBtn.cloneNode(true);
            submitBtn.parentNode.replaceChild(newBtn, submitBtn);
            newBtn.innerHTML = "Submit";
            newBtn.style.backgroundColor = "";
            newBtn.addEventListener('click', checkCode);
            
            openPageBtn.classList.add("hidden");
            iframeHint.classList.add("hidden");
            resultDiv.innerHTML = "";
            generatedLink = "";
            iframeAllowed = false;
        }

        function copyLink(link) {
            navigator.clipboard.writeText(link).then(() => {
                showNotification("🔗 Link copied to clipboard!", "success");
            }).catch(err => {
                console.error("Error copying link:", err);
                showNotification("❌ Failed to copy link.", "error");
            });
        }

        function openPage() {
            if (!generatedLink || !iframeAllowed) return;

            const iframeContainer = document.getElementById('iframeContainer');
            const closeBtn = document.getElementById('closeIframeBtn');
            const iframe = document.getElementById('siteFrame');
            
            iframe.src = generatedLink;
            iframeContainer.style.display = 'block';
            closeBtn.style.display = 'flex';
            document.body.classList.add('iframe-open');
            
            // Reset button position to top-right when opening
            closeBtn.style.top = '20px';
            closeBtn.style.right = '20px';
            closeBtn.style.left = 'auto';
            closeBtn.style.bottom = 'auto';
            
            // Reset drag flags
            isDragging = false;
            hasMoved = false;
        }

        function closeIframe() {
            const iframeContainer = document.getElementById('iframeContainer');
            const closeBtn = document.getElementById('closeIframeBtn');
            const iframe = document.getElementById('siteFrame');
            
            iframe.src = 'about:blank';
            iframeContainer.style.display = 'none';
            closeBtn.style.display = 'none';
            document.body.classList.remove('iframe-open');
            
            // Reset drag flags
            isDragging = false;
            hasMoved = false;
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.innerHTML = message;
            notification.className = type;
            notification.style.display = 'block';

            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // Improved draggable functionality with proper mouse tracking
        function initDraggable() {
            const closeBtn = document.getElementById('closeIframeBtn');
            
            function startDrag(e) {
                e.preventDefault();
                e.stopPropagation();
                
                isDragging = true;
                hasMoved = false;
                closeBtn.classList.add('dragging');
                
                // Get mouse position
                const clientX = e.clientX;
                const clientY = e.clientY;
                
                dragStartX = clientX;
                dragStartY = clientY;
                
                // Get button position
                const rect = closeBtn.getBoundingClientRect();
                buttonStartX = rect.left;
                buttonStartY = rect.top;
                
                // Attach global event listeners to document (not just button)
                dragHandler = onDrag;
                dragEndHandler = stopDrag;
                
                document.addEventListener('mousemove', dragHandler);
                document.addEventListener('mouseup', dragEndHandler);
            }
            
            function onDrag(e) {
                if (!isDragging) return;
                e.preventDefault();
                
                // Mark that we've moved (to prevent click)
                hasMoved = true;
                
                const clientX = e.clientX;
                const clientY = e.clientY;
                
                // Calculate new position
                let newX = buttonStartX + (clientX - dragStartX);
                let newY = buttonStartY + (clientY - dragStartY);
                
                // Keep within viewport
                const btnRect = closeBtn.getBoundingClientRect();
                const maxX = window.innerWidth - btnRect.width - 10;
                const maxY = window.innerHeight - btnRect.height - 10;
                const minX = 10;
                const minY = 10;
                
                newX = Math.min(Math.max(newX, minX), maxX);
                newY = Math.min(Math.max(newY, minY), maxY);
                
                // Apply position
                closeBtn.style.left = newX + 'px';
                closeBtn.style.top = newY + 'px';
                closeBtn.style.right = 'auto';
                closeBtn.style.bottom = 'auto';
                
                // Update button start position for smoother dragging
                buttonStartX = newX;
                buttonStartY = newY;
                dragStartX = clientX;
                dragStartY = clientY;
            }
            
            function stopDrag(e) {
                if (!isDragging) return;
                
                isDragging = false;
                closeBtn.classList.remove('dragging');
                
                // Remove global event listeners
                document.removeEventListener('mousemove', dragHandler);
                document.removeEventListener('mouseup', dragEndHandler);
                
                // If we didn't move, trigger the click
                if (!hasMoved && e && e.target === closeBtn) {
                    // Small delay to ensure click doesn't interfere with drag end
                    setTimeout(() => {
                        if (closeBtn.style.display === 'flex') {
                            closeIframe();
                        }
                    }, 10);
                }
            }
            
            // Handle click separately to prevent clicks after drag
            closeBtn.addEventListener('mousedown', startDrag);
            
            // Prevent the click event if we dragged
            closeBtn.addEventListener('click', (e) => {
                if (hasMoved) {
                    e.preventDefault();
                    e.stopPropagation();
                    hasMoved = false;
                    return false;
                }
            });
        }

        // Input event listener
        document.getElementById('codeInput').addEventListener('input', function() {
            resetForNewCode();
        });

        document.getElementById('submitBtn').addEventListener('click', checkCode);
        document.getElementById('openPageBtn').addEventListener('click', openPage);
        
        // Don't add click listener directly to close button - handled in draggable
        // document.getElementById('closeIframeBtn').addEventListener('click', closeIframe);

        document.getElementById('openPageBtn').classList.add('hidden');
        document.getElementById('iframeHint').classList.add('hidden');
        document.getElementById('iframeContainer').style.display = 'none';
        document.getElementById('closeIframeBtn').style.display = 'none';
        
        // Initialize draggable
        initDraggable();
    </script>
</body>
</html>
